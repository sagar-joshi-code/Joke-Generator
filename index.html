<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Joke Generator</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(to right, #667eea, #764ba2);
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        text-align: center;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-bottom: 20px;
      }

      .joke-box {
        background: #f3f3f3;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        min-height: 80px;
      }

      #setup {
        font-weight: bold;
      }

      #punchline {
        margin-top: 10px;
        color: #555;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;

        transition: 0.3s;
      }

      button:hover {
        background: #5a67d8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>😂 Joke Generator</h1>

      <div class="joke-box">
        <p id="setup">Click the button to get a joke</p>
        <p id="punchline"></p>
      </div>

      <button id="btn">Get Joke</button>
    </div>
  </body>
  <script src="script.js"></script>
</html>
